<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakım Modu - Who Dat Idols?</title>
    <!-- Use main styles and font awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff3366;
            --secondary-color: #0bd1d1;
            --bg-dark: #0a0a0a;
            --bg-elevated: #141414;
            --text-light: #ffffff;
            --text-muted: #999999;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Abstract background effects */
        .bg-glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(255, 51, 102, 0.15) 0%, rgba(10, 10, 10, 0) 70%);
            top: -200px;
            left: -200px;
            z-index: 0;
            border-radius: 50%;
            pointer-events: none;
        }

        .bg-glow-2 {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(11, 209, 209, 0.1) 0%, rgba(10, 10, 10, 0) 70%);
            bottom: -150px;
            right: -150px;
            z-index: 0;
            border-radius: 50%;
            pointer-events: none;
        }

        .maintenance-container {
            text-align: center;
            z-index: 10;
            background: rgba(20, 20, 20, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 60px 40px;
            border-radius: 24px;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .icon-container {
            font-size: 80px;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 16px;
            letter-spacing: -0.5px;
        }

        p {
            font-size: 1.1rem;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            margin: 0 auto 30px;
            max-width: 300px;
        }

        .progress-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            width: 30%;
            border-radius: 10px;
            animation: loadingFill 2s infinite ease-in-out alternate;
        }

        @keyframes loadingFill {
            0% {
                width: 10%;
                transform: translateX(0);
            }

            100% {
                width: 10%;
                transform: translateX(900%);
            }
        }

        .brand {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 500;
        }

        .brand img {
            width: 24px;
            height: 24px;
            filter: grayscale(100%) opacity(0.6);
        }
    </style>
</head>

<body>
    <div class="bg-glow"></div>
    <div class="bg-glow-2"></div>

    <div class="maintenance-container">
        <div class="icon-container">
            <i class="fas fa-tools"></i>
        </div>
        <h1>Şu An Bakımdayız</h1>
        <p>Size daha iyi, daha hızlı ve daha güvenli bir platform sunabilmek için şu anda altyapımızda kısa bir planlı
            çalışma yapıyoruz. Lütfen kısa bir süre sonra tekrar ziyaret edin.</p>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="brand">
            <img src="/favicon.svg" alt="Logo">
            Who Dat Idols?
        </div>
    </div>
</body>

</html>
