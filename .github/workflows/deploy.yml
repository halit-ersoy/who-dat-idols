name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '-live-')

    steps:
      - name: Sunucuya Baglan ve Guncelle
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: 22
          script: |
            # 1. Proje Klasorune Git
            cd /home/who-dat-idols

            # 2. GitHub'dan En Guncel Kodlari Cek (Zorla)
            git fetch --all
            git reset --hard origin/main
            
            # 3. Gradle'a Calisma Izni Ver (Kritik Adim!)
            chmod +x gradlew

            # 4. Temiz Derleme Yap (Release Modu Hazirligi)
            ./gradlew clean build -x test --no-daemon

            # 5. Servisi Yeniden Baslat (Prod Modunda Kalkacak)
            systemctl restart whodatidols
            
            # 6. Durum Raporu Ver (Gecikmeli ve hata kodunu yutarak)
            sleep 5
            systemctl status whodatidols --no-pager || true

      - name: Purge Cloudflare Cache
        run: |
          RESPONSE=$(curl -s -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}')
          echo "Cloudflare Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Cloudflare Cache Purge successful!"
          else
            echo "Cloudflare Cache Purge failed!"
            exit 1
          fi